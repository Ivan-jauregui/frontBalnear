<div class="relative min-h-[80vh] flex flex-col items-center justify-center bg-gradient-to-b from-blue-950 via-blue-900 to-sky-900 px-4 py-16 text-center overflow-hidden">
  
  <!-- Imagen de fondo sutil (Mar del Plata de fondo) -->
  <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center mix-blend-overlay opacity-25 pointer-events-none"></div>

  <!-- Contenido Principal -->
  <div class="relative z-10 max-w-4xl mx-auto flex flex-col items-center">
    
    <!-- H1: Título de Alto Impacto -->
    <h1 class="text-4xl md:text-6xl font-black text-white tracking-tight leading-tight mb-6">
      Tu carpa ideal en Mar del Plata,<br class="hidden md:inline">
      <span class="text-sky-300">a un click de distancia.</span>
    </h1>

    <!-- H2: Subtítulo -->
    <p class="text-base md:text-xl text-blue-100/90 font-medium max-w-2xl mb-12 leading-relaxed">
      Encontrá, compará y reservá tu lugar en la playa según lo que de verdad necesitás. Rápido, directo y sin vueltas.
    </p>

    <!-- Formulario de Búsqueda (Buscador "Híbrido" Estilo Píldora) -->
    <form class="w-full bg-white/95 backdrop-blur-md p-4 md:p-3 rounded-2xl md:rounded-full shadow-2xl flex flex-col md:flex-row items-center gap-3 border border-white/20">
      
      <!-- Campo 1: Zona (Select para evitar errores de tipeo) -->
      <div class="w-full md:w-1/3 px-5 py-2 flex flex-col items-start text-left md:border-r border-gray-200">
        <label class="text-[10px] font-extrabold uppercase tracking-wider text-sky-800 mb-1">¿Qué zona preferís?</label>
        <select class="w-full bg-transparent text-gray-800 font-bold focus:outline-none cursor-pointer appearance-none text-sm">
          <option value="" disabled selected>Elegí la playa...</option>
          <option value="playa-grande">Playa Grande</option>
          <option value="punta-mogotes">Punta Mogotes</option>
          <option value="zona-sur">Zona Sur</option>
          <option value="la-perla">La Perla / Centro</option>
        </select>
      </div>

      <!-- Campo 2: Tipo de Sombra -->
      <div class="w-full md:w-1/4 px-5 py-2 flex flex-col items-start text-left md:border-r border-gray-200">
        <label class="text-[10px] font-extrabold uppercase tracking-wider text-sky-800 mb-1">Tipo de sombra</label>
        <select class="w-full bg-transparent text-gray-800 font-bold focus:outline-none cursor-pointer appearance-none text-sm">
          <option value="" disabled selected>¿Carpa o sombrilla?</option>
          <option value="carpa">Carpa de Playa</option>
          <option value="sombrilla">Sombrilla</option>
        </select>
      </div>

      <!-- Campo 3: Fecha (Corregido y optimizado para UX) -->
      <div class="w-full md:w-1/4 px-5 py-2 flex flex-col items-start text-left">
        <label class="text-[10px] font-extrabold uppercase tracking-wider text-sky-800 mb-1">¿Cuándo venís?</label>
        <input type="date" class="w-full bg-transparent text-gray-800 font-bold focus:outline-none cursor-pointer text-sm">
      </div>

      <!-- Botón de Acción Principal -->
      <button type="submit" class="w-full md:w-auto bg-sky-600 hover:bg-sky-500 text-white font-bold px-8 py-4 rounded-xl md:rounded-full shadow-lg hover:shadow-sky-500/20 transition-all duration-200 flex items-center justify-center gap-2 whitespace-nowrap transform hover:scale-[1.02]"
      (click)="onSearch()">
        <!-- Ícono de Lupa de HeroIcons -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
        </svg>
        Buscar Balnearios
      </button>

    </form>

  </div>
</div>
