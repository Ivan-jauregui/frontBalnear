<!-- Selector de archivo -->
  <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
    <span class="text-3xl mb-2">📸</span>
    <span class="text-sm text-gray-600">Seleccionar imagen</span>
    <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
  </label>

  <!-- Previsualización -->
  @if (vistaPreviaUrl) {
    <div class="w-full h-48 rounded-xl overflow-hidden border">
      <img [src]="vistaPreviaUrl" alt="Vista previa" class="w-full h-full object-cover" />
    </div>
  }

  <!-- Botones de Acción -->
  <div class="flex gap-3">
    <button
      type="button"
      (click)="omitir()"
      class="w-1/3 py-2.5 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
      Omitir
    </button>

    <button
      type="button"
      (click)="subirYFinalizar()"
      [disabled]="!archivoSeleccionado || cargando"
      class="w-2/3 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 font-medium flex justify-center items-center">
      @if (cargando) {
        <span>Guardando...</span>
      } @else {
        <span>Subir e ir al Home</span>
      }
    </button>
  </div>
